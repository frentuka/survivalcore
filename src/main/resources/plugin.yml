name: SurvivalCore
version: 1.0
main: site.ftka.survivalcore.MClass
description: Survival Core
author: srleg
api-version: '1.21'
folia-supported: true
libraries:
  - io.lettuce:lettuce-core:6.5.3.RELEASE
  - org.apache.commons:commons-pool2:2.4.3
commands:
  chat:
    description: run ChatManager app
  s:
    description: Current screen's command
  exitscreen:
    description: exit any screen the player is on
  backscreen:
    description: go back to the previous screen page
  server:
    description: run ServerAdministration app
    aliases:
      - sv
  permissions:
    description: run PermissionsManager players app
    aliases:
      - p
      - perms
      - perm
  groups:
    description: run PermissionsManager groups app
    aliases:
      - g
      - group
  wbtest:
    description: test the world board service
  randomspawn:
    description: randomly teleport to a valid spawn chunk or analyse valid spawns